<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>โลกเล็กๆ ของเรา 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Mitr:wght@300;400;500&family=Charm:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #faf7f2; --blush: #f2ddd8; --rose: #d4a8a0;
      --dusty: #b88a82; --text: #3d2e2b; --muted: #9a7e7a;
      --white: #ffffff; --card: rgba(255,255,255,0.75);
    }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); color: var(--text); font-family: "Sarabun", sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; position: relative; }

    /* LOADER */
    #loader { position: fixed; inset: 0; background: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 500; transition: opacity .7s ease, visibility .7s ease; }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-heart { width: 44px; height: 44px; background: var(--rose); transform: rotate(45deg); animation: heartbeat .85s ease-in-out infinite; position: relative; border-radius: 4px; }
    .loader-heart::before, .loader-heart::after { content: ""; position: absolute; width: 44px; height: 44px; background: var(--rose); border-radius: 50%; }
    .loader-heart::before { top: -22px; left: 0; }
    .loader-heart::after { left: -22px; top: 0; }
    .loader-text { font-family: "Charm", cursive; font-size: 15px; color: var(--dusty); letter-spacing: .1em; margin-top: 12px; }
    @keyframes heartbeat { 0%,100% { transform: rotate(45deg) scale(1); } 50% { transform: rotate(45deg) scale(1.18); } }

    /* MAIN */
    main { opacity: 0; transform: translateY(16px); transition: opacity .9s ease .2s, transform .9s ease .2s; }
    main.visible { opacity: 1; transform: translateY(0); }

    /* EYEBROW */
    .eyebrow { text-align: center; padding: 32px 0 0; font-family: "Mitr", sans-serif; font-size: 11px; letter-spacing: .22em; color: var(--muted); }

    /* HERO */
    .hero { display: flex; flex-direction: column; align-items: center; padding: 20px 24px 48px; gap: 30px; }
    .hero-text { text-align: center; width: 100%; max-width: 320px; }
    .hero-text h1 { font-family: "Charm", cursive; font-weight: 700; font-size: clamp(2.2rem, 10vw, 3.4rem); line-height: 1.2; color: var(--text); }
    .hero-text h1 em { font-style: normal; color: var(--dusty); }
    .hero-text p { margin-top: 10px; font-family: "Sarabun", sans-serif; font-size: 14px; color: var(--muted); letter-spacing: .04em; font-weight: 300; }

    /* PHOTO CARD */
    .photo-card { width: 100%; max-width: 320px; position: relative; display: flex; flex-direction: column; align-items: center; }
    .photo-frame { width: 100%; aspect-ratio: 3/4; border-radius: 24px 24px 0 0; overflow: hidden; box-shadow: 0 10px 36px rgba(180,130,120,.2); position: relative; }
    .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: default; }
    
    /* โหมดแก้ไขรูปจะจิ้มได้ */
    .photo-frame.edit-active img { cursor: pointer; filter: brightness(0.7); }
    .photo-frame.edit-active::after { content: "📸 จิ้มเพื่อเปลี่ยนรูป"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-family: "Mitr", sans-serif; font-size: 14px; background: rgba(0,0,0,0.4); pointer-events: none; }

    .ig-btn { display: flex; align-items: center; justify-content: center; gap: 9px; width: 100%; padding: 16px 24px; border-radius: 0 0 24px 24px; background: linear-gradient(135deg,var(--rose),var(--dusty)); color: #fff; font-family: "Mitr", sans-serif; font-size: 15px; font-weight: 400; letter-spacing: .06em; text-decoration: none; box-shadow: 0 8px 24px rgba(180,130,120,.28); transition: filter .2s ease; }
    
    /* TOP RIGHT BUTTONS */
    .top-btns { position: fixed; top: 16px; right: 16px; z-index: 100; display: flex; align-items: center; gap: 8px; }
    .gear-btn { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; background: var(--white); box-shadow: 0 2px 14px rgba(180,130,120,.2); color: var(--dusty); font-size: 18px; transition: transform .2s ease; }
    .gear-btn:hover { transform: rotate(45deg); }
    .close-btn { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; background: #c0605a; color: #fff; font-size: 16px; box-shadow: 0 2px 14px rgba(0,0,0,0.2); }
    
    /* MODAL POPUP */
    .modal-bg { position: fixed; inset: 0; background: rgba(61,46,43,.5); backdrop-filter: blur(4px); z-index: 600; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity .3s, visibility .3s; }
    .modal-bg.show { opacity: 1; visibility: visible; }
    .modal-box { background: var(--cream); border-radius: 24px; padding: 28px; max-width: 300px; width: 88%; text-align: center; box-shadow: 0 16px 40px rgba(0,0,0,0.2); }
    .modal-box h2 { font-family: "Charm", cursive; font-size: 1.6rem; margin-bottom: 8px; color: var(--text); }
    .modal-box p { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .modal-input { width: 100%; padding: 10px 16px; border: 1.5px solid var(--rose); border-radius: 100px; text-align: center; font-size: 16px; outline: none; margin-bottom: 12px; background: var(--white); color: var(--text); }
    .modal-btn { width: 100%; padding: 12px; border-radius: 100px; background: linear-gradient(135deg,var(--rose),var(--dusty)); color: white; border: none; font-family: "Mitr", sans-serif; cursor: pointer; font-size: 15px; }
    .modal-cancel { margin-top: 10px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; display: block; width: 100%; }
    .error-msg { color: #c0605a; font-size: 12px; margin-top: -6px; margin-bottom: 10px; display: none; }

    /* BANNER */
    .edit-banner { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #3d2e2b; color: #fff; padding: 10px 20px; border-radius: 100px; font-size: 12px; font-family: "Mitr", sans-serif; z-index: 100; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; white-space: nowrap; }
    
    .petal { position: fixed; pointer-events: none; font-size: 13px; opacity: 0; animation: fall linear infinite; z-index: 0; }
    @keyframes fall { 0% { opacity: 0; transform: translateY(-20px) rotate(0deg); } 10% { opacity: .45; } 90% { opacity: .25; } 100% { opacity: 0; transform: translateY(100vh) rotate(360deg); } }
    #fileInput { display: none; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="loader-heart"></div>
    <p class="loader-text">กำลังโหลดความรัก...</p>
  </div>

  <div class="top-btns">
    <button class="gear-btn" id="gearBtn">⚙️</button>
    <button class="close-btn" id="closeBtn">❌</button>
  </div>

  <div class="modal-bg" id="modalBg">
    <div class="modal-box">
      <h2>ใส่รหัสเพื่อแก้ไข</h2>
      <p>กรอกรหัสผ่านเข้าสู่โหมดแก้ไขรูปภาพ</p>
      <input type="password" class="modal-input" id="pwInput" placeholder="กรอกรหัสผ่าน">
      <div class="error-msg" id="errorMsg">รหัสผ่านไม่ถูกต้อง!</div>
      <button class="modal-btn" id="submitBtn">ยืนยัน</button>
      <button class="modal-cancel" id="cancelBtn">ยกเลิก</button>
    </div>
  </div>

  <div class="edit-banner" id="editBanner">✏️ โหมดแก้ไข: จิ้มที่รูปภาพเพื่อเปลี่ยนรูปได้เลย</div>
  <input type="file" id="fileInput" accept="image/*">

  <main>
    <p class="eyebrow">✦ คนสำคัญของผม ✦</p>
    
    <section class="hero">
      <div class="hero-text">
        <h1>แฟนผม <em>🤍</em></h1>
        <p>คนที่ผมรักที่สุดในโลก</p>
      </div>

      <div class="photo-card">
        <div class="photo-frame" id="photoFrame">
          <img id="couplePhoto" src="1000001888.jpg" alt="รูปแฟน">
        </div>
        <a href="https://instagram.com/" class="ig-btn" target="_blank">
          IG : แฟนผม 🤍
        </a>
      </div>
    </section>
  </main>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      // ปิด Loader เมื่อโหลดเสร็จ
      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
        document.querySelector('main').classList.add('visible');
      }, 1000);

      // เอฟเฟกต์ดอกไม้ร่วง
      const petals = ['🌸', '🌷', '✿', '💕'];
      setInterval(() => {
        if(document.hidden) return;
        const petal = document.createElement('div');
        petal.className = 'petal';
        petal.innerText = petals[Math.floor(Math.random() * petals.length)];
        petal.style.left = Math.random() * 100 + 'vw';
        petal.style.animationDuration = Math.random() * 5 + 5 + 's';
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 10000);
      }, 600);

      // --- ระบบรหัสผ่านและโหมดแก้ไขตามใจสั่ง ---
      const PASSWORD = "123456"; // รหัสผ่านสำหรับเปิดโหมดแก้ไข
      const gearBtn = document.getElementById('gearBtn');
      const closeBtn = document.getElementById('closeBtn');
      const modalBg = document.getElementById('modalBg');
      const cancelBtn = document.getElementById('cancelBtn');
      const submitBtn = document.getElementById('submitBtn');
      const pwInput = document.getElementById('pwInput');
      const errorMsg = document.getElementById('errorMsg');
      const photoFrame = document.getElementById('photoFrame');
      const couplePhoto = document.getElementById('couplePhoto');
      const fileInput = document.getElementById('fileInput');
      const editBanner = document.getElementById('editBanner');

      // กดเฟืองเปิดกล่องรหัส
      gearBtn.addEventListener('click', () => {
        modalBg.classList.add('show');
        pwInput.value = '';
        errorMsg.style.display = 'none';
      });

      // กดกากบาทออกจากโหมดแก้ไข ทันที!
      closeBtn.addEventListener('click', () => {
        closeBtn.style.display = 'none';
        gearBtn.style.display = 'flex';
        photoFrame.classList.remove('edit-active');
        editBanner.style.display = 'none';
      });

      // กดยกเลิก
      cancelBtn.addEventListener('click', () => {
        modalBg.classList.remove('show');
      });

      // กดปุ่มยืนยันรหัสผ่าน
      submitBtn.addEventListener('click', () => {
        if (pwInput.value === PASSWORD) {
          modalBg.classList.remove('show');
          gearBtn.style.display = 'none';
          closeBtn.style.display = 'flex'; // แสดงปุ่มกากบาทข้างๆ แทนเฟือง
          photoFrame.classList.add('edit-active'); // เปิดโหมดจิ้มรูป
          editBanner.style.display = 'block';
        } else {
          errorMsg.style.display = 'block';
        }
      });

      // เมื่อจิ้มที่รูปภาพในโหมดแก้ไข จะเด้งให้เลือกไฟล์ในเครื่อง
      couplePhoto.addEventListener('click', () => {
        if (photoFrame.classList.contains('edit-active')) {
          fileInput.click();
        }
      });

      // เปลี่ยนรูปภาพทันทีเมื่อเลือกไฟล์เสร็จ
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(event) {
            couplePhoto.src = event.target.result;
          };
          reader.readAsDataURL(file);
        }
      });
    });
  </script>
</body>
</html>
