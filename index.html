<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คนสำคัญของผม</title>
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
  <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Anuphan', sans-serif;
      background-color: #ffeef2;
      color: #555;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    /* หัวใจและดอกไม้ตกแต่งฉากหลัง */
    .decor {
      position: absolute;
      font-size: 24px;
      opacity: 0.6;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(20deg); }
    }
    main {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
      text-align: center;
      max-width: 400px;
      width: 90%;
      z-index: 10;
    }
    p.title {
      font-size: 1.2rem;
      color: #ff7b93;
      font-weight: 600;
      margin-bottom: 15px;
    }
    h1 em {
      font-style: normal;
      color: #ff4766;
    }
    .subtitle {
      margin-top: 5px;
      font-size: 1rem;
      color: #888;
    }
    .img-container {
      margin: 20px auto;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      overflow: hidden;
      border: 5px solid #ffeef2;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <!-- ตกแต่งรอบๆ -->
  <div class="decor" style="top: 10%; left: 10%; animation-delay: 0s;">🌸</div>
  <div class="decor" style="top: 20%; right: 15%; animation-delay: 1s;">🌷</div>
  <div class="decor" style="bottom: 15%; left: 15%; animation-delay: 2s;">🌸</div>
  <div class="decor" style="bottom: 20%; right: 10%; animation-delay: 3s;">✿</div>

  <main>
    <p class="title">✦ คนสำคัญของผม ✦</p>

    <section>
      <div>
        <h1><em>แฟนผม 🤍</em></h1>
        <p class="subtitle">คนที่ผมรัก</p>
      </div>

      <div class="img-container">
        <!-- เปลี่ยนเป็นชื่อไฟล์รูปภาพใหม่เรียบร้อยครับ -->
        <img alt="คนสำคัญ" src="1000001888.jpg">
      </div>
    </section>
  </main>

</body>
</html>
