<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>โลกเล็กๆ ของเรา 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;1,300&family=Mitr:wght@300;400;500&family=Charm:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #faf7f2; --blush: #f2ddd8; --rose: #d4a8a0;
      --dusty: #b88a82; --text: #3d2e2b; --muted: #9a7e7a;
      --white: #ffffff; --card: rgba(255,255,255,0.85);
    }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); color: var(--text); font-family: "Sarabun", sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }

    /* LOADER */
    #loader { position: fixed; inset: 0; background: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 200; transition: opacity .7s ease, visibility .7s ease; }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-heart { width: 44px; height: 44px; background: var(--rose); transform: rotate(45deg); animation: heartbeat .85s ease-in-out infinite; position: relative; border-radius: 4px; }
    .loader-heart::before, .loader-heart::after { content: ""; position: absolute; width: 44px; height: 44px; background: var(--rose); border-radius: 50%; }
    .loader-heart::before { top: -22px; left: 0; }
    .loader-heart::after { left: -22px; top: 0; }
    .loader-text { font-family: "Charm", cursive; font-size: 15px; color: var(--dusty); letter-spacing: .1em; margin-top: 12px; }
    @keyframes heartbeat { 0%,100% { transform: rotate(45deg) scale(1); } 50% { transform: rotate(45deg) scale(1.18); } }

    /* MAIN */
    main { opacity: 0; transform: translateY(16px); transition: opacity .9s ease .2s, transform .9s ease .2s; }
    main.visible { opacity: 1; transform: translateY(0); }

    /* TOP RIGHT BUTTONS */
    .top-btns { position: fixed; top: 16px; right: 16px; z-index: 100; display: flex; align-items: center; gap: 8px; }
    .gear-btn { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; background: var(--card); box-shadow: 0 2px 14px rgba(180,130,120,.2); color: var(--dusty); backdrop-filter: blur(8px); transition: transform .25s ease; }
    .gear-btn:hover { transform: rotate(45deg); }
    .exit-btn { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg,var(--rose),var(--dusty)); color: #fff; box-shadow: 0 2px 14px rgba(180,130,120,.3); transition: transform .2s ease; }
    .exit-btn:hover { transform: scale(1.1); }
    .exit-btn { display: none; }
    .exit-btn.show { display: flex; }

    /* PASSWORD MODAL */
    .modal-bg { position: fixed; inset: 0; background: rgba(61,46,43,.5); backdrop-filter: blur(6px); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity .3s ease, visibility .3s ease; }
    .modal-bg.show { opacity: 1; visibility: visible; }
    .modal-box { background: var(--cream); border-radius: 24px; padding: 32px 28px; max-width: 300px; width: 88%; text-align: center; box-shadow: 0 16px 48px rgba(180,130,120,.3); transform: scale(.92); transition: transform .3s ease; }
    .modal-bg.show .modal-box { transform: scale(1); }
    .modal-box h2 { font-family: "Charm",cursive; font-size: 1.6rem; color: var(--text); margin-bottom: 6px; }
    .modal-box p { font-family: "Sarabun",sans-serif; font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
    .modal-input { width: 100%; padding: 13px 16px; border: 1.5px solid rgba(212,168,160,.5); border-radius: 100px; font-family: "Sarabun",sans-serif; font-size: 16px; text-align: center; background: var(--white); color: var(--text); outline: none; letter-spacing: .25em; transition: border-color .2s; }
    .modal-input:focus { border-color: var(--rose); }
    .modal-input.shake { animation: shake .35s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .modal-err { font-family: "Sarabun",sans-serif; font-size: 12px; color: #c0605a; margin-top: 8px; min-height: 18px; }
    .modal-btn { margin-top: 16px; width: 100%; padding: 14px; border-radius: 100px; background: linear-gradient(135deg,var(--rose),var(--dusty)); color: #fff; font-family: "Mitr",sans-serif; font-size: 15px; border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(180,130,120,.3); transition: filter .2s; }
    .modal-btn:hover { filter: brightness(1.08); }
    .modal-cancel { margin-top: 12px; background: none; border: none; font-family: "Sarabun",sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; padding: 4px 8px; }

    /* EDIT MODE BANNER */
    .edit-banner { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg,var(--rose),var(--dusty)); color: #fff; border-radius: 100px; padding: 12px 24px; font-family: "Mitr",sans-serif; font-size: 13px; letter-spacing: .05em; box-shadow: 0 6px 24px rgba(180,130,120,.35); z-index: 100; white-space: nowrap; display: none; }
    .edit-banner.show { display: block; }

    /* EDIT OVERLAY on photo */
    .edit-overlay { position: absolute; inset: 0; background: rgba(61,46,43,.42); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; opacity: 0; pointer-events: none; transition: opacity .25s ease; border-radius: 24px 24px 0 0; }
    .edit-overlay.active { opacity: 1; pointer-events: all; cursor: pointer; }
    .edit-overlay span { font-family: "Mitr",sans-serif; font-size: 14px; color: #fff; letter-spacing: .08em; }

    .eyebrow { text-align: center; padding: 32px 0 0; font-family: "Mitr",sans-serif; font-size: 11px; letter-spacing: .22em; color: var(--muted); }
    .hero { display: flex; flex-direction: column; align-items: center; padding: 20px 24px 48px; gap: 30px; }
    .hero-text { text-align: center; }
    .hero-text h1 { font-family: "Charm",cursive; font-weight: 700; font-size: clamp(2.2rem,10vw,3.4rem); line-height: 1.2; color: var(--text); }
    .hero-text h1 em { font-style: normal; color: var(--dusty); }
    .hero-text p { margin-top: 10px; font-size: 14px; color: var(--muted); font-weight: 300; }
    .photo-card { width: 100%; max-width: 320px; position: relative; display: flex; flex-direction: column; align-items: center; }
    .photo-frame { width: 100%; aspect-ratio: 3/4; border-radius: 24px 24px 0 0; overflow: hidden; box-shadow: 0 10px 36px rgba(180,130,120,.2); position: relative; }
    .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-card::before, .photo-card::after { content: ""; position: absolute; width: 10px; height: 10px; border-radius: 50%; background: var(--rose); opacity: .55; z-index: 1; }
    .photo-card::before { top: -5px; right: -5px; }
    .photo-card::after { bottom: 62px; left: -5px; }
    .ig-btn { display: flex; align-items: center; justify-content: center; gap: 9px; width: 100%; padding: 16px 24px; border-radius: 0 0 24px 24px; background: linear-gradient(135deg,var(--rose),var(--dusty)); color: #fff; font-family: "Mitr",sans-serif; font-size: 15px; font-weight: 400; letter-spacing: .06em; text-decoration: none; box-shadow: 0 8px 24px rgba(180,130,120,.28); transition: filter .2s ease; }
    .ig-btn:hover { filter: brightness(1.07); }
    .divider { width: 48px; height: 1px; background: var(--rose); margin: 0 auto; opacity: .45; }
    .counter-section { padding: 0 20px 44px; display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .section-eyebrow { font-family: "Mitr",sans-serif; font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); text-align: center; }
    .milestone-badge { background: linear-gradient(135deg,var(--rose),var(--dusty)); color: #fff; border-radius: 100px; padding: 10px 28px; font-family: "Charm",cursive; font-size: clamp(1.15rem,5vw,1.4rem); box-shadow: 0 4px 20px rgba(180,130,120,.3); text-align: center; }
    .counter-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; width: 100%; max-width: 340px; }
    .counter-unit { background: var(--card); border: 1px solid rgba(212,168,160,.28); border-radius: 16px; padding: 14px 6px 10px; text-align: center; backdrop-filter: blur(8px); box-shadow: 0 2px 14px rgba(180,130,120,.08); }
    .counter-num { font-family: "Charm",cursive; font-size: clamp(1.7rem,7vw,2.3rem); color: var(--text); line-height: 1; display: block; transition: transform .12s ease; }
    .counter-num.tick { transform: scale(1.1); }
    .counter-unit small { display: block; font-family: "Mitr",sans-serif; font-size: 9px; letter-spacing: .14em; color: var(--muted); margin-top: 5px; }
    .counter-since { font-family: "Sarabun",sans-serif; font-size: 12.5px; color: var(--muted); text-align: center; }
    .countdown-wrap { width: 100%; max-width: 340px; background: var(--card); border: 1.5px dashed rgba(212,168,160,.45); border-radius: 20px; padding: 18px 12px 14px; text-align: center; box-shadow: 0 2px 14px rgba(180,130,120,.06); }
    .countdown-title { font-family: "Sarabun",sans-serif; font-size: 13px; color: var(--muted); margin-bottom: 14px; line-height: 1.7; }
    .countdown-title strong { font-family: "Mitr",sans-serif; color: var(--dusty); font-weight: 500; display: block; font-size: 13px; margin-top: 2px; }
    .countdown-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    .cd-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .cd-num { font-family: "Charm",cursive; font-size: clamp(1.5rem,6vw,1.9rem); color: var(--dusty); line-height: 1; transition: transform .12s ease; }
    .cd-num.tick { transform: scale(1.1); }
    .cd-unit small { font-family: "Mitr",sans-serif; font-size: 9px; letter-spacing: .12em; color: var(--muted); }
    .quote-section { padding: 0 28px 48px; text-align: center; }
    .quote-section blockquote { font-family: "Charm",cursive; font-size: clamp(1.1rem,5vw,1.4rem); color: var(--dusty); line-height: 1.9; max-width: 290px; margin: 0 auto; }
    footer { text-align: center; padding: 0 24px 44px; font-family: "Sarabun",sans-serif; font-size: 12px; color: var(--muted); opacity: .65; }
    footer span { color: var(--rose); }
    .petal { position: fixed; pointer-events: none; font-size: 13px; opacity: 0; animation: fall linear infinite; z-index: 0; }
    @keyframes fall { 0%{opacity:0;transform:translateY(-20px) rotate(0deg);} 10%{opacity:.45;} 90%{opacity:.25;} 100%{opacity:0;transform:translateY(100vh) rotate(360deg);} }
    #fileInput { display: none; }
    @media (prefers-reduced-motion:reduce) { .petal,.loader-heart,main{animation:none;transition:none;} main{opacity:1;transform:none;} }
  </style>
</head>
<body>

  <!-- LOADER -->
  <div id="loader">
    <div class="loader-heart"></div>
    <p class="loader-text">กำลังโหลดความรัก...</p>
  </div>

  <!-- PASSWORD MODAL -->
  <div class="modal-bg" id="modalBg">
    <div class="modal-box">
      <h2>🔐 ใส่รหัส</h2>
      <p>ใส่รหัสเพื่อเข้าสู่<br>โหมดแก้ไขรูปภาพ</p>
      <input class="modal-input" id="pwInput" type="password" placeholder="••••••" maxlength="20" />
      <p class="modal-err" id="pwErr"></p>
      <button class="modal-btn" id="pwOkBtn">ยืนยัน</button>
      <br/>
      <button class="modal-cancel" id="modalCancelBtn">ยกเลิก</button>
    </div>
  </div>

  <!-- EDIT BANNER -->
  <div class="edit-banner" id="editBanner">✏️ โหมดแก้ไข — กดที่รูปเพื่อเปลี่ยน</div>

  <!-- TOP RIGHT BUTTONS -->
  <div class="top-btns">
    <button class="exit-btn" id="exitBtn" title="ออกโหมดแก้ไข">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="gear-btn" id="gearBtn" title="แก้ไขรูป">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <input type="file" id="fileInput" accept="image/*" />

  <div class="petal" style="left:7%;animation-duration:10s;animation-delay:0s;">🌸</div>
  <div class="petal" style="left:21%;animation-duration:13s;animation-delay:2.5s;">🌷</div>
  <div class="petal" style="left:53%;animation-duration:11s;animation-delay:4s;">🌸</div>
  <div class="petal" style="left:77%;animation-duration:15s;animation-delay:1s;">✿</div>
  <div class="petal" style="left:90%;animation-duration:8.5s;animation-delay:6s;">🌸</div>

        <h1><em>แฟนผม 🤍</em></h1>
        <p>คนที่ผมรัก</p>
